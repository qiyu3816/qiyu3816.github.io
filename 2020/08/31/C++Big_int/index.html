 class="built_in">string</span>(<span class="string">&quot;0&quot;</span>);<span class="comment">//存储每次够减的次数</span></span><br><span class="line"></span><br><span class="line">		<span class="keyword">do</span></span><br><span class="line">		&#123;</span><br><span class="line">			result = left_k - right_k;</span><br><span class="line">			left_k.str_va = result.str_va;</span><br><span class="line">			count = count + Big_int(<span class="string">&quot;1&quot;</span>);</span><br><span class="line">        &#125; <span class="keyword">while</span> (Bigger(result.str_va , right_k.str_va) &amp;&amp;</span><br><span class="line">			left_k.str_va!=<span class="built_in">string</span>(<span class="string">&quot;0&quot;</span>));<span class="comment">//直到除数小，或左操作数为0，全部整除</span></span><br><span class="line">		<span class="keyword">if</span> (left_k.str_va == right_k.str_va)</span><br><span class="line">		&#123;</span><br><span class="line">			count = count + Big_int(<span class="string">&quot;1&quot;</span>);</span><br><span class="line">			left_k = left_k - right_k;</span><br><span class="line">		&#125;</span><br><span class="line"></span><br><span class="line">		k = index;</span><br><span class="line">		<span class="keyword">while</span> (k &gt; <span class="number">0</span>)</span><br><span class="line">		&#123;</span><br><span class="line">			<span class="comment">//给够减的次数后添加 0，得出一轮结果</span></span><br><span class="line">			count.str_va = count.str_va + <span class="string">&quot;0&quot;</span>;</span><br><span class="line">			k--;</span><br><span class="line">		&#125;</span><br><span class="line">		</span><br><span class="line">		NumStack.push(count);<span class="comment">//将结果入栈</span></span><br><span class="line"></span><br><span class="line">		</span><br><span class="line">		right_k.str_va.<span class="built_in">clear</span>();<span class="comment">//清空右操作数，进行下次运算</span></span><br><span class="line">		right_k = va1;</span><br><span class="line">	&#125;</span><br><span class="line">	</span><br><span class="line">	<span class="keyword">if</span> (NumStack.<span class="built_in">size</span>() == <span class="number">1</span>)</span><br><span class="line">	&#123;</span><br><span class="line">		<span class="keyword">if</span> (isMinus)</span><br><span class="line">			<span class="keyword">return</span> <span class="string">&#x27;-&#x27;</span> + NumStack.top().str_va;</span><br><span class="line">		<span class="keyword">return</span> NumStack.top().str_va;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">//对栈的操作</span></span><br><span class="line">	<span class="function">Big_int <span class="title">result</span><span class="params">(<span class="string">&quot;&quot;</span>)</span></span>;</span><br><span class="line">	<span class="function">Big_int <span class="title">left_t</span><span class="params">(<span class="string">&quot;&quot;</span>)</span></span>;</span><br><span class="line">	<span class="function">Big_int <span class="title">right_t</span><span class="params">(<span class="string">&quot;&quot;</span>)</span></span>;</span><br><span class="line">	<span class="keyword">while</span> (!NumStack.empty())</span><br><span class="line">	&#123;</span><br><span class="line">		<span class="keyword">if</span> (result.str_va.length() != <span class="number">0</span>)</span><br><span class="line">		&#123;</span><br><span class="line">			NumStack.push(result);</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="keyword">right_t</span> = NumStack.top();</span><br><span class="line">		NumStack.pop();</span><br><span class="line">		<span class="keyword">left_t</span> = NumStack.top();</span><br><span class="line">		NumStack.pop();</span><br><span class="line">		result = <span class="keyword">left_t</span> + <span class="keyword">right_t</span>;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">if</span> (isMinus)</span><br><span class="line">		<span class="keyword">return</span> <span class="string">&#x27;-&#x27;</span> + result.str_va;</span><br><span class="line">	<span class="keyword">return</span> result.str_va;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">Big_int <span class="keyword">operator</span>%(<span class="keyword">const</span> Big_int&amp; va0, <span class="keyword">const</span> Big_int&amp; va1)<span class="comment">//求模</span></span><br><span class="line">&#123;</span><br><span class="line">	Big_int left_k = va0, right_k = va1;</span><br><span class="line">	Big_int result = left_k - (left_k / right_k) * right_k;</span><br><span class="line">	<span class="keyword">return</span> result.str_va;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">ostream &amp; <span class="keyword">operator</span>&lt;&lt;(ostream&amp; os, <span class="keyword">const</span> Big_int&amp; t)<span class="comment">//重载&lt;&lt;</span></span><br><span class="line">&#123;</span><br><span class="line">	os &lt;&lt; t.str_va;</span><br><span class="line">	<span class="keyword">return</span> os;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
